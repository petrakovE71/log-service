services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: log_service_app
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-devsecretchangeme32charslong1234}
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASSWORD:-guest}@rabbitmq:5672/%2f
    healthcheck:
      test: curl -f http://localhost/api/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - log_service_network

  rabbitmq:
    build:
      context: ./docker/rabbitmq
      dockerfile: Dockerfile
    container_name: log_service_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - log_service_network

networks:
  log_service_network:
    driver: bridge
