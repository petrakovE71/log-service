framework:
    messenger:
        failure_transport: failed

        transports:
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                options:
                    exchange:
                        name: logs.ingest
                        type: direct
                        durable: true
                        default_publish_routing_key: logs.ingest
                    queues:
                        logs.ingest:
                            durable: true
                            binding_keys: [logs.ingest]
                            arguments:
                                x-queue-type: classic

            failed: 'in-memory://'

        routing:
            'App\Message\ProcessLogBatchMessage': async

when@test:
    framework:
        messenger:
            transports:
                async: 'in-memory://'
